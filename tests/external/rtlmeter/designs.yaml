# RTLMeter design configuration for slang-netlist tests.
#
# Each top-level key is a unique test name. By default the rtlmeter design
# directory is derived from the test name; use the 'design' field to override
# this when multiple tests share the same design (e.g. different configs).
#
# Schema:
#   <TestName>:
#     enabled: true|false      # default: true
#     design: <DesignName>     # rtlmeter design directory (default: TestName)
#     config: <ConfigName>     # optional rtlmeter configuration to select
#     args:                    # optional extra slang-netlist flags
#       - <flag or file path>
#
# Entries in 'args' that do not start with '-' are resolved as file paths
# relative to the design's directory inside rtlmeter.

Example:
  enabled: true
  args:
    - -DVERILATOR

BlackParrot:
  enabled: false
  config: 1x1
  args:
    - -DVERILATOR
    - --allow-dup-initial-drivers

Caliptra:
  enabled: false

NVDLA:
  enabled: true
  args:
    - -Wno-duplicate-definition

OpenPiton:
  enabled: true
  config: 1x1
  args:
    - --single-unit
    - -DVERILATOR
    - -Wno-unconnected-port
    - -Wno-range-oob
    - -Wno-range-width-oob
    - -Wno-unsized-concat
    - -Wno-redef-macro
    - -Wno-explicit-static
    - -Wno-string-int-concat
    - -Wno-range-select-reversed

OpenTitan:
  enabled: true
  args:
    - -DVERILATOR
    - --single-unit
    - src/prim_assert.sv
    - --relax-enum-conversions
    - -Wno-unconnected-port

Vortex:
  enabled: false
  config: mini
  args:
    - -DVERILATOR
    - --allow-hierarchical-const
    - -Wno-misplaced-trailing-separator
    - -Wno-mixed-var-assigns

VeeR-EH1:
  enabled: true
  args:
    - --single-unit

VeeR-EH2:
  enabled: true
  args:
    - --single-unit

VeeR-EL2:
  enabled: true
  args:
    - --single-unit

XiangShan-mini:
  enabled: true
  design: XiangShan
  config: mini-chisel6
  args:
    - --single-unit

XiangShan-full:
  enabled: true
  design: XiangShan
  config: default-chisel6
  args:
    - --single-unit

XuanTie-C906:
  enabled: true
  args:
    - --single-unit

XuanTie-C910:
  enabled: true
  args:
    - --single-unit

XuanTie-E902:
  enabled: true
  args:
    - --single-unit

XuanTie-E906:
  enabled: true
  args:
    - --single-unit
