# RTLMeter design configuration for slang-netlist tests.
#
# Each top-level key is a design name corresponding to the rtlmeter design
# directory. Use 'configs' to list the configurations to test; each config
# produces a separate test named "<Design>-<config>". When 'configs' is
# omitted a single test named after the design is produced.
#
# Schema:
#   <DesignName>:
#     enabled: true|false      # default: true
#     configs:                 # optional list of rtlmeter configurations
#       - <ConfigName>
#     args:                    # optional extra slang-netlist flags
#       - <flag or file path>
#
# Entries in 'args' that do not start with '-' are resolved as file paths
# relative to the design's directory inside rtlmeter.

Example:
  enabled: true
  configs:
    - kind
    - loud
  args:
    - -DVERILATOR

BlackParrot:
  enabled: false
  configs:
    - 1x1
    - 2x2
    - 4x4
  args:
    - -DVERILATOR
    - --allow-dup-initial-drivers

Caliptra:
  enabled: false

NVDLA:
  enabled: true
  args:
    - -Wno-duplicate-definition

OpenPiton:
  enabled: true
  configs:
    - 1x1
    - 2x2
    - 4x4
    - 8x8
  args:
    - --single-unit
    - -DVERILATOR
    - -Wno-unconnected-port
    - -Wno-range-oob
    - -Wno-range-width-oob
    - -Wno-unsized-concat
    - -Wno-redef-macro
    - -Wno-explicit-static
    - -Wno-string-int-concat
    - -Wno-range-select-reversed

OpenTitan:
  enabled: true
  args:
    - -DVERILATOR
    - --single-unit
    - src/prim_assert.sv
    - --relax-enum-conversions
    - -Wno-unconnected-port

Vortex:
  enabled: true
  configs:
    #- mini
    - sane
    #- huge
  args:
    - -DVERILATOR
    - --allow-hierarchical-const
    - -Wno-misplaced-trailing-separator
    - -Wno-mixed-var-assigns

VeeR-EH1:
  enabled: true
  configs:
    - default
    - hiperf
    - asic
  args:
    - --single-unit

VeeR-EH2:
  enabled: true
  configs:
    - default
    - hiperf
    - asic
  args:
    - --single-unit

VeeR-EL2:
  enabled: true
  configs:
    - default
    - hiperf
    - asic
  args:
    - --single-unit

XiangShan:
  enabled: true
  configs:
    - mini-chisel3
    - mini-chisel6
    - default-chisel3
    - default-chisel6
  args:
    - --single-unit

XuanTie-C906:
  enabled: true
  args:
    - --single-unit

XuanTie-C910:
  enabled: true
  args:
    - --single-unit

XuanTie-E902:
  enabled: true
  args:
    - --single-unit

XuanTie-E906:
  enabled: true
  args:
    - --single-unit
